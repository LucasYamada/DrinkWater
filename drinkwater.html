<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Intake Calculator — How Much Water Should I Drink a Day?</title>
  <meta name="description" content="Free water intake calculator by weight. Find out how many liters and bottles of water to drink per day. Instant, no sign-up." />
  <meta name="keywords" content="water intake calculator, how much water should I drink, daily water intake, hydration calculator, water per day by weight" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #185FA5;
      --blue-light: #378ADD;
      --blue-bg: #E6F1FB;
      --text: #1a1a1a;
      --text-muted: #666;
      --text-hint: #999;
      --bg: #ffffff;
      --surface: #f5f5f3;
      --border: rgba(0,0,0,0.1);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* NAV */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1.5rem;
      border-bottom: 0.5px solid var(--border);
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo svg { color: var(--blue-light); }

    /* LANG SWITCHER */
    .lang-switcher {
      display: flex;
      gap: 4px;
    }
    .lang-btn {
      background: none;
      border: 0.5px solid var(--border);
      border-radius: 6px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      padding: 4px 8px;
      cursor: pointer;
      transition: all 0.15s;
      width: auto;
    }
    .lang-btn:hover { border-color: var(--blue-light); color: var(--blue); }
    .lang-btn.active { background: var(--blue-bg); border-color: var(--blue-light); color: var(--blue); }

    /* AD BANNER */
    .ad-banner {
      background: var(--surface);
      border: 0.5px dashed var(--border);
      border-radius: var(--radius-sm);
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--text-hint);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin: 1.25rem auto;
      max-width: 728px;
      padding: 0 1rem;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 3rem 1.25rem 2rem;
      max-width: 580px;
      margin: 0 auto;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--blue-bg);
      color: var(--blue);
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 999px;
      margin-bottom: 1.25rem;
      letter-spacing: 0.03em;
    }
    h1 {
      font-size: clamp(24px, 5vw, 40px);
      font-weight: 500;
      line-height: 1.2;
      margin-bottom: 0.875rem;
      color: var(--text);
    }
    h1 em { font-style: normal; color: var(--blue-light); }
    .hero-sub {
      font-size: clamp(15px, 2vw, 17px);
      color: var(--text-muted);
      max-width: 400px;
      margin: 0 auto;
    }

    /* CARD */
    .card-wrap {
      max-width: 460px;
      margin: 0 auto 1.25rem;
      padding: 0 1rem;
    }
    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(1.25rem, 4vw, 2rem);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .field { margin-bottom: 1.125rem; }
    label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 5px;
    }
    .input-row { display: flex; gap: 8px; }
    input[type="number"], select {
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
      appearance: none;
      -webkit-appearance: none;
      min-width: 0;
    }
    input[type="number"] { flex: 1; width: 100%; }
    select { width: 88px; flex-shrink: 0; cursor: pointer; }
    input[type="number"]:focus, select:focus {
      border-color: var(--blue-light);
      box-shadow: 0 0 0 3px rgba(55,138,221,0.15);
    }
    input[type="number"]::placeholder { color: var(--text-hint); }

    .calc-btn {
      width: 100%;
      padding: 12px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .calc-btn:hover { background: #0C447C; }
    .calc-btn:active { transform: scale(0.98); }

    /* RESULT */
    .result {
      display: none;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 0.5px solid var(--border);
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 1rem;
    }
    .metric {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 1rem 0.75rem;
      text-align: center;
    }
    .metric-num {
      font-size: clamp(32px, 8vw, 40px);
      font-weight: 500;
      color: var(--blue);
      line-height: 1;
    }
    .metric-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 5px;
    }
    .result-msg {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 1.125rem;
      line-height: 1.6;
    }
    .tips {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .tip {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 10px 6px;
      text-align: center;
    }
    .tip-icon { font-size: 18px; margin-bottom: 4px; }
    .tip span {
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.4;
      display: block;
    }

    /* FEATURES */
    .features {
      max-width: 460px;
      margin: 0 auto 2.5rem;
      padding: 0 1rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .feat {
      text-align: center;
      padding: 1rem 0.5rem;
    }
    .feat-icon { font-size: 20px; margin-bottom: 6px; }
    .feat strong {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 2px;
    }
    .feat p { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 1.25rem 1rem;
      border-top: 0.5px solid var(--border);
      font-size: 12px;
      color: var(--text-hint);
    }

    /* RESPONSIVE */
    @media (max-width: 400px) {
      nav { padding: 0.75rem 1rem; }
      .hero { padding: 2rem 1rem 1.5rem; }
      .tips { grid-template-columns: 1fr 1fr; }
      .features { grid-template-columns: 1fr 1fr; }
      .ad-banner { height: 60px; font-size: 10px; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="#">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.5 9 4 13.5 4 16a8 8 0 0 0 16 0c0-2.5-2.5-7-8-14z"/></svg>
      DrinkWater
    </a>
    <div class="lang-switcher" role="group" aria-label="Language">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('pt')">PT</button>
      <button class="lang-btn" onclick="setLang('es')">ES</button>
    </div>
  </nav>

  <div class="ad-banner">
    <!-- Google AdSense 728×90 -->
    Ad space — 728×90
  </div>

  <div class="hero">
    <div class="hero-badge">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.5 9 4 13.5 4 16a8 8 0 0 0 16 0c0-2.5-2.5-7-8-14z"/></svg>
      <span data-i18n="badge"></span>
    </div>
    <h1 data-i18n="h1-before"><em data-i18n="h1-em"></em><span data-i18n="h1-after"></span></h1>
    <p class="hero-sub" data-i18n="sub"></p>
  </div>

  <div class="card-wrap">
    <div class="card">

      <div class="field">
        <label for="weight" data-i18n="label-weight"></label>
        <div class="input-row">
          <input type="number" id="weight" min="1" max="300" data-i18n-placeholder="placeholder-weight" />
          <select id="unit" aria-label="Weight unit">
            <option value="kg">kg</option>
            <option value="lb">lb</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="bottle" data-i18n="label-bottle"></label>
        <div class="input-row">
          <input type="number" id="bottle" min="1" max="5000" data-i18n-placeholder="placeholder-bottle" />
          <select id="bunit" aria-label="Volume unit">
            <option value="ml">ml</option>
            <option value="l">L</option>
            <option value="oz">fl oz</option>
          </select>
        </div>
      </div>

      <button class="calc-btn" onclick="calculate()" data-i18n="btn"></button>

      <div class="result" id="result">
        <div class="result-grid">
          <div class="metric">
            <div class="metric-num" id="liters">—</div>
            <div class="metric-label" data-i18n="liters-label"></div>
          </div>
          <div class="metric">
            <div class="metric-num" id="bottles">—</div>
            <div class="metric-label" id="bottle-label"></div>
          </div>
        </div>
        <p class="result-msg" id="msg"></p>
        <div class="tips">
          <div class="tip"><div class="tip-icon">🕐</div><span data-i18n="tip1"></span></div>
          <div class="tip"><div class="tip-icon">☀️</div><span data-i18n="tip2"></span></div>
          <div class="tip"><div class="tip-icon">🍎</div><span data-i18n="tip3"></span></div>
        </div>
      </div>

    </div>
  </div>

  <div class="ad-banner" style="max-width:460px;">
    <!-- Google AdSense 336×280 -->
    Ad space — 336×280
  </div>

  <div class="features">
    <div class="feat"><div class="feat-icon">⚡</div><strong data-i18n="feat1-title"></strong><p data-i18n="feat1-desc"></p></div>
    <div class="feat"><div class="feat-icon">🔬</div><strong data-i18n="feat2-title"></strong><p data-i18n="feat2-desc"></p></div>
    <div class="feat"><div class="feat-icon">📱</div><strong data-i18n="feat3-title"></strong><p data-i18n="feat3-desc"></p></div>
  </div>

  <footer data-i18n="footer"></footer>

  <script>
    var LANGS = {
      en: {
        badge: 'Free water intake calculator',
        'h1-before': 'How much water should ',
        'h1-em': 'you',
        'h1-after': ' drink a day?',
        sub: 'Enter your weight. Get your daily water intake in liters and bottles — instantly.',
        'label-weight': 'Your weight',
        'placeholder-weight': 'e.g. 70',
        'label-bottle': 'Bottle size',
        'placeholder-bottle': 'e.g. 500',
        btn: 'Calculate water intake',
        'liters-label': 'liters per day',
        'bottle-unit': 'bottles/day',
        tip1: 'Space it across the day',
        tip2: 'More in heat & exercise',
        tip3: 'Fruits & soups count',
        'feat1-title': 'Instant results',
        'feat1-desc': 'No sign-up, no waiting',
        'feat2-title': 'Science-based',
        'feat2-desc': '35ml per kg of body weight',
        'feat3-title': 'Any device',
        'feat3-desc': 'Mobile, tablet, desktop',
        footer: '© 2025 DrinkWater · Stay hydrated 💧',
        'err-weight': 'Please enter your weight.',
        'err-bottle': 'Please enter your bottle size.',
        'result-msg': function(bd, n) { return 'With your ' + bd + ' bottle, drink ' + n + ' full bottle' + (n !== 1 ? 's' : '') + ' every day.'; },
        'bottle-label': function(bd) { return bd + ' bottles/day'; }
      },
      pt: {
        badge: 'Calculadora de hidratação gratuita',
        'h1-before': 'Quanto de água você deve ',
        'h1-em': 'beber',
        'h1-after': ' por dia?',
        sub: 'Digite seu peso. Saiba sua ingestão diária de água em litros e garrafas — na hora.',
        'label-weight': 'Seu peso',
        'placeholder-weight': 'ex: 70',
        'label-bottle': 'Tamanho da garrafa',
        'placeholder-bottle': 'ex: 500',
        btn: 'Calcular ingestão de água',
        'liters-label': 'litros por dia',
        'bottle-unit': 'garrafas/dia',
        tip1: 'Distribua ao longo do dia',
        tip2: 'Mais no calor e exercício',
        tip3: 'Frutas e sopas contam',
        'feat1-title': 'Resultado imediato',
        'feat1-desc': 'Sem cadastro, sem espera',
        'feat2-title': 'Base científica',
        'feat2-desc': '35ml por kg de peso corporal',
        'feat3-title': 'Qualquer dispositivo',
        'feat3-desc': 'Mobile, tablet, desktop',
        footer: '© 2025 DrinkWater · Mantenha-se hidratado 💧',
        'err-weight': 'Por favor, informe seu peso.',
        'err-bottle': 'Por favor, informe o tamanho da garrafa.',
        'result-msg': function(bd, n) { return 'Com sua garrafa de ' + bd + ', você precisa beber ' + n + ' garrafa' + (n !== 1 ? 's' : '') + ' por dia.'; },
        'bottle-label': function(bd) { return 'garrafas de ' + bd + '/dia'; }
      },
      es: {
        badge: 'Calculadora de hidratación gratuita',
        'h1-before': '¿Cuánta agua debes ',
        'h1-em': 'beber',
        'h1-after': ' al día?',
        sub: 'Ingresa tu peso. Obtén tu ingesta diaria de agua en litros y botellas — al instante.',
        'label-weight': 'Tu peso',
        'placeholder-weight': 'ej: 70',
        'label-bottle': 'Tamaño de botella',
        'placeholder-bottle': 'ej: 500',
        btn: 'Calcular ingesta de agua',
        'liters-label': 'litros por día',
        'bottle-unit': 'botellas/día',
        tip1: 'Distribúyelo durante el día',
        tip2: 'Más en calor y ejercicio',
        tip3: 'Frutas y sopas cuentan',
        'feat1-title': 'Resultados al instante',
        'feat1-desc': 'Sin registro, sin esperas',
        'feat2-title': 'Base científica',
        'feat2-desc': '35ml por kg de peso corporal',
        'feat3-title': 'Cualquier dispositivo',
        'feat3-desc': 'Móvil, tablet, escritorio',
        footer: '© 2025 DrinkWater · Mantente hidratado 💧',
        'err-weight': 'Por favor, ingresa tu peso.',
        'err-bottle': 'Por favor, ingresa el tamaño de la botella.',
        'result-msg': function(bd, n) { return 'Con tu botella de ' + bd + ', debes beber ' + n + ' botella' + (n !== 1 ? 's' : '') + ' cada día.'; },
        'bottle-label': function(bd) { return 'botellas de ' + bd + '/día'; }
      }
    };

    var currentLang = 'en';

    function setLang(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;
      var t = LANGS[lang];

      document.querySelectorAll('[data-i18n]').forEach(function(el) {
        var key = el.getAttribute('data-i18n');
        if (t[key] !== undefined && typeof t[key] === 'string') el.textContent = t[key];
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
        var key = el.getAttribute('data-i18n-placeholder');
        if (t[key]) el.placeholder = t[key];
      });

      document.querySelectorAll('.lang-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.textContent === lang.toUpperCase());
      });

      var resultVisible = document.getElementById('result').style.display === 'block';
      if (resultVisible) calculate(true);
    }

    function calculate(silent) {
      var rawW = parseFloat(document.getElementById('weight').value);
      var unit = document.getElementById('unit').value;
      var rawB = parseFloat(document.getElementById('bottle').value);
      var bunit = document.getElementById('bunit').value;
      var t = LANGS[currentLang];

      if (!rawW || rawW <= 0) { if (!silent) alert(t['err-weight']); return; }
      if (!rawB || rawB <= 0) { if (!silent) alert(t['err-bottle']); return; }

      var kg = unit === 'lb' ? rawW * 0.453592 : rawW;
      var totalMl = kg * 35;

      var bottleMl;
      if (bunit === 'ml') bottleMl = rawB;
      else if (bunit === 'l') bottleMl = rawB * 1000;
      else bottleMl = rawB * 29.5735;

      var liters = (Math.round(totalMl / 100) / 10).toFixed(1);
      var bottleCount = Math.ceil(totalMl / bottleMl);
      var bottleDisplay = bunit === 'l' ? rawB + 'L' : bunit === 'oz' ? rawB + ' fl oz' : rawB + 'ml';

      document.getElementById('liters').textContent = liters;
      document.getElementById('bottles').textContent = bottleCount;
      document.getElementById('bottle-label').textContent = t['bottle-label'](bottleDisplay);
      document.getElementById('msg').textContent = t['result-msg'](bottleDisplay, bottleCount);

      var result = document.getElementById('result');
      result.style.display = 'block';
      if (!silent) result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    ['weight', 'bottle'].forEach(function(id) {
      document.getElementById(id).addEventListener('keydown', function(e) {
        if (e.key === 'Enter') calculate();
      });
    });

    setLang('en');
  </script>

</body>
</html>
